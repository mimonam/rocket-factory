version: '3'

# Task definitions. Run `task --list` to see all tasks with descriptions.
tasks:
  build:
    desc: Build all packages
    cmds:
      - go build ./...

  test:
    desc: Run tests with the race detector
    cmds:
      - go test -race ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run

  fmt:
    desc: Format the code with gofumpt
    cmds:
      - gofumpt -w .

  tidy:
    desc: Tidy Go modules
    cmds:
      - go mod tidy

  update:
    desc: Upgrade dependencies
    cmds:
      - go get -u ./...
      - go mod tidy

  check:
    desc: Check code quality
    cmds:
      - task lint
      - task build
      - task test